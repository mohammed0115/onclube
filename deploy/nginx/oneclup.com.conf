# ─────────────────────────────────────────────────────────────────────────────
# OneClup — Nginx server block  (oneclup.com / www.oneclup.com)
#
# Independent of the existing Onlenco vhost. All names are OneClup-scoped so this
# file can never collide with Onlenco's config.
#
# Install:
#   sudo cp deploy/nginx/oneclup.com.conf /etc/nginx/sites-available/oneclup.com
#   sudo ln -s /etc/nginx/sites-available/oneclup.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS (Let's Encrypt) — run AFTER the port-80 block below is live:
#   sudo certbot --nginx -d oneclup.com -d www.oneclup.com
# Certbot fills in the ssl_certificate lines and the 80→443 redirect automatically.
#
# IMPORTANT: DEPLOY_DIR below must match where you cloned the repo / run compose,
# because Nginx serves the bind-mounted ./frontend_dist, ./staticfiles and ./media.
# Default assumed here: /opt/oneclup/app
# ─────────────────────────────────────────────────────────────────────────────

# WebSocket upgrade helper (uniquely named to avoid clashing with Onlenco's map).
map $http_upgrade $oneclup_conn_upgrade {
    default upgrade;
    ''      close;
}

# The Dockerized app, published on the loopback only.
upstream oneclup_backend {
    server 127.0.0.1:8001;
    keepalive 16;
}

# ── HTTP :80 — ACME challenge + redirect to HTTPS ────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name oneclup.com www.oneclup.com;

    # Let's Encrypt HTTP-01 challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 — the app ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oneclup.com www.oneclup.com;

    # --- TLS (managed by certbot; these paths are created by the certbot run) ---
    ssl_certificate     /etc/letsencrypt/live/oneclup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oneclup.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:oneclup_ssl:10m;
    ssl_session_timeout 1d;

    # Allow media uploads (payment proofs etc.).
    client_max_body_size 25m;

    # --- gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml application/xml+rss text/javascript image/svg+xml
        application/wasm font/woff2;

    # --- security headers (edge) ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # A CSP is intentionally omitted: the SPA + Agora WebRTC need a carefully-tuned
    # policy. Add one only after testing screen-share/video, e.g.:
    #   add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://*.agora.io wss://*.agora.io; ..." always;

    # ---------- Django admin + DRF static (served by WhiteNoise via the app) ----
    # collectstatic writes these to the bind-mounted ./staticfiles, so Nginx can
    # also serve them directly for speed:
    location /static/ {
        alias /opt/oneclup/app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ---------- user uploads ----------
    location /media/ {
        alias /opt/oneclup/app/media/;
        expires 7d;
        access_log off;
    }

    # ---------- API ----------
    location /api/ {
        proxy_pass http://oneclup_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 90s;
    }

    # ---------- Django admin ----------
    location /admin/ {
        proxy_pass http://oneclup_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- WebSocket endpoint (future Django Channels; harmless if unused) --
    location /ws/ {
        proxy_pass http://oneclup_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $oneclup_conn_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # ---------- SPA (React build) ----------
    root /opt/oneclup/app/frontend_dist;
    index index.html;

    # Long-cache hashed assets.
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the app shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Client-side routing: everything else falls back to the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
