# OneClup — HTTP-ONLY bootstrap vhost.
#
# Use this FIRST (before you have a certificate). It serves the app over :80 and
# exposes the ACME challenge path so certbot can issue a cert. Then run:
#   sudo certbot --nginx -d oneclup.com -d www.oneclup.com
# certbot rewrites this block to add the :443 server + HTTP→HTTPS redirect.
#
# Install:
#   sudo cp deploy/nginx/oneclup-bootstrap.conf /etc/nginx/sites-available/oneclup.com
#   sudo ln -sf /etc/nginx/sites-available/oneclup.com /etc/nginx/sites-enabled/oneclup.com
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $oneclup_conn_upgrade { default upgrade; '' close; }
upstream oneclup_backend { server 127.0.0.1:8001; keepalive 16; }

server {
    listen 80;
    listen [::]:80;
    server_name oneclup.com www.oneclup.com;
    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml font/woff2;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;

    # Let's Encrypt HTTP-01 challenge (served directly, never proxied → no 301).
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location /static/ { alias /opt/oneclup/app/staticfiles/; access_log off; expires 30d; }
    location /media/  { alias /opt/oneclup/app/media/;  access_log off; expires 7d; }
    location /assets/ {
        root /opt/oneclup/app/frontend_dist;
        access_log off; expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://oneclup_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        proxy_pass http://oneclup_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /ws/ {
        proxy_pass http://oneclup_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $oneclup_conn_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    root /opt/oneclup/app/frontend_dist;
    index index.html;
    location = /index.html { add_header Cache-Control "no-store"; }
    location / { try_files $uri $uri/ /index.html; }
}
